<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COD: آل دخيل الله - نسخة الرقص والموسيقى</title>
    <script src="https://unpkg.com/trystero@0.16.1/dist/trystero-torrent.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #game-container { width: 100vw; height: 100vh; position: relative; background: #111; overflow: hidden; }
        #map { width: 2500px; height: 2500px; position: absolute; background: #2c3e50; background-image: radial-gradient(#34495e 10%, transparent 10%); background-size: 50px 50px; transition: transform 0.05s linear; }
        
        /* أنيميشن الرقصة */
        @keyframes danceAnim {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.3) rotate(30deg); }
            50% { transform: scale(1.1) rotate(-30deg); }
            75% { transform: scale(1.3) rotate(15deg); }
        }
        .dancing { animation: danceAnim 0.4s infinite; border: 4px solid #00ff00 !important; }
        .dance-text { position: absolute; top: -50px; color: #00ff00; font-weight: bold; font-size: 1.2rem; display: none; text-shadow: 2px 2px #000; }

        .player { position: absolute; width: 55px; height: 55px; background-size: cover; z-index: 10; display: flex; flex-direction: column; align-items: center; border: 2px solid transparent; border-radius: 10px; }
        .me { background-image: url('https://cdn-icons-png.flaticon.com/512/714/714412.png'); }
        .enemy { background-image: url('https://cdn-icons-png.flaticon.com/512/714/714392.png'); }
        .name-tag { position: absolute; top: -25px; font-size: 12px; color: #d4af37; font-weight: bold; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 3px; }

        /* أزرار التحكم */
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; padding: 0 10px; pointer-events: none; z-index: 100; }
        .btn { width: 85px; height: 85px; border-radius: 50%; pointer-events: auto; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #move-btn { background: rgba(255,255,255,0.2); }
        #fire-btn { background: rgba(192, 57, 43, 0.9); }
        #dance-btn { background: linear-gradient(45deg, #9b59b6, #8e44ad); color: white; border-color: #e0aaff; }
        
        #hud { position: absolute; top: 20px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; border-left: 4px solid #9b59b6; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="map">
        <div id="my-player" class="player me">
            <div id="my-dance-msg" class="dance-text">PARTY! 🕺🔥</div>
            <div class="name-tag">أنت (وسام)</div>
        </div>
    </div>
</div>

<div id="hud">
    <div style="font-size: 1rem;">القتلات: <span id="kills">0</span>/20</div>
    <div style="font-size: 0.8rem; color: #bbb;">اضغط "رقصة" للموسيقى!</div>
</div>

<div id="controls">
    <div id="move-btn" class="btn">تحريك</div>
    <div id="dance-btn" class="btn">رقصة 🎵</div>
    <div id="fire-btn" class="btn">FIRE</div>
</div>

<script>
    const myID = "Wessam_" + Math.floor(Math.random() * 999);
    const map = document.getElementById('map');
    const me = document.getElementById('my-player');
    const myDanceMsg = document.getElementById('my-dance-msg');
    let pos = { x: 1250, y: 1250 };

    // رابط موسيقى الرقصة
    const danceMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');

    const room = Trystero.joinRoom({appId: 'cod-wessam-music-v4'}, 'dance-floor');
    const [sendAction, getAction] = room.makeAction('action');

    // زر الرقصة والموسيقى
    document.getElementById('dance-btn').onclick = () => {
        me.classList.add('dancing');
        myDanceMsg.style.display = 'block';
        danceMusic.currentTime = 0;
        danceMusic.play(); // تشغيل الموسيقى
        
        sendAction({id: myID, type: 'dance', x: pos.x, y: pos.y});
        
        setTimeout(() => {
            me.classList.remove('dancing');
            myDanceMsg.style.display = 'none';
            danceMusic.pause(); // إيقاف الموسيقى بعد انتهاء الرقصة
        }, 3000); 
    };

    // تحريك بسيط للتجربة
    document.getElementById('move-btn').ontouchstart = () => {
        pos.y -= 15;
        update();
    };

    function update() {
        me.style.left = pos.x + 'px';
        me.style.top = pos.y + 'px';
        map.style.transform = `translate(${-pos.x + window.innerWidth/2}px, ${-pos.y + window.innerHeight/2}px)`;
        sendAction({id: myID, type: 'move', x: pos.x, y: pos.y});
    }

    let enemies = {};
    getAction(data => {
        if (!enemies[data.id]) {
            const div = document.createElement('div');
            div.className = 'player enemy';
            div.innerHTML = `<div class="dance-text">PARTY! 🕺🔥</div><div class="name-tag">${data.id}</div>`;
            map.appendChild(div);
            enemies[data.id] = div;
        }
        
        enemies[data.id].style.left = data.x + 'px';
        enemies[data.id].style.top = data.y + 'px';

        if (data.type === 'dance') {
            enemies[data.id].classList.add('dancing');
            enemies[data.id].querySelector('.dance-text').style.display = 'block';
            setTimeout(() => {
                enemies[data.id].classList.remove('dancing');
                enemies[data.id].querySelector('.dance-text').style.display = 'none';
            }, 3000);
        }
    });

    update();
</script>
</body>
</html>
