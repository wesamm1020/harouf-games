<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحدي آل دخيل الله - أونلاين سريع</title>
    <script src="https://unpkg.com/trystero@0.16.1/dist/trystero-torrent.min.js"></script>
    <style>
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; }
        .score { font-size: 2rem; color: #d4af37; margin: 20px; }
        .target { font-size: 5rem; color: #fff; text-shadow: 0 0 20px #d4af37; }
        .letter { position: absolute; padding: 20px; border: 2px solid #d4af37; border-radius: 50%; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>
    <h1>حروف مع آل دخيل الله (أونلاين مباشر) 🎙️</h1>
    <div class="score">نقاطنا: <span id="myScore">0</span></div>
    <div class="target" id="target">؟</div>
    <div id="gameArea"></div>

    <script>
        // إعداد الاتصال التلقائي (أونلاين)
        const config = {appId: 'huroof-dakhil-allah'};
        const room = joinRoom(config, 'global_room');
        const [sendScore, onScore] = room.makeAction('score');

        let score = 0;
        const letters = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";
        let currentTarget = letters[Math.floor(Math.random() * letters.length)];
        document.getElementById('target').innerText = currentTarget;

        // استقبال النقاط من اللاعبين الآخرين
        onScore((data) => {
            console.log("خويك سجل نقطة!");
            // هنا تقدر تزيد عداد الخصم
        });

        function spawn() {
            const char = letters[Math.floor(Math.random() * letters.length)];
            const div = document.createElement('div');
            div.className = 'letter';
            div.innerText = char;
            div.style.left = Math.random() * 80 + 10 + "vw";
            div.style.top = Math.random() * 50 + 30 + "vh";
            
            div.onclick = () => {
                if(char === currentTarget) {
                    score++;
                    document.getElementById('myScore').innerText = score;
                    sendScore({score: score}); // إرسال النقطة لخويك أونلاين
                    currentTarget = letters[Math.floor(Math.random() * letters.length)];
                    document.getElementById('target').innerText = currentTarget;
                }
            };
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
        setInterval(spawn, 1000);
    </script>
</body>
</html>
